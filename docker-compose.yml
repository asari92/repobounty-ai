version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      # Provide keys here or use an .env file
      # - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      # - PROGRAM_ID=${PROGRAM_ID:-}
    networks:
      - repobounty-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - repobounty-network

networks:
  repobounty-network:
    driver: bridge