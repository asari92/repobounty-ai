services:
  solana-check:
    profiles:
      - deploy
    image: repobounty-ai-solana-program:latest
    build: ./program
    working_dir: /app
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ANCHOR_PROVIDER_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ANCHOR_WALLET=/wallet/id.json
      - PROGRAM_ARTIFACTS_DIR=/artifacts
    volumes:
      - ./program:/app
      - ./program/.artifacts:/artifacts
      - program-node-modules:/app/node_modules
      - program-target:/app/target
      - ${SOLANA_DEPLOY_WALLET:-./program/.wallet}:/wallet:ro
    command: ["/app/scripts/check-program.sh"]
    restart: "no"
    networks:
      - repobounty
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  solana-deployer:
    profiles:
      - deploy
    image: repobounty-ai-solana-program:latest
    build: ./program
    working_dir: /app
    environment:
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ANCHOR_PROVIDER_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - ANCHOR_WALLET=/wallet/id.json
      - PROGRAM_ARTIFACTS_DIR=/artifacts
      - SERVICE_PRIVATE_KEY=${SERVICE_PRIVATE_KEY:-}
    volumes:
      - ./program:/app
      - ./program/.artifacts:/artifacts
      - program-node-modules:/app/node_modules
      - program-target:/app/target
      - ${SOLANA_DEPLOY_WALLET:-./program/.wallet}:/wallet:ro
    command: ["/app/scripts/deploy-devnet.sh"]
    restart: "no"
    networks:
      - repobounty
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - PORT=8080
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MODEL=${MODEL:-nvidia/nemotron-3-super-120b-a12b:free}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SERVICE_PRIVATE_KEY=${SERVICE_PRIVATE_KEY:-}
      - PROGRAM_ID=${PROGRAM_ID:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - DATABASE_PATH=/data/repobounty.db
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - repobounty
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    ports:
      - "5173:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - repobounty
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backend-data:
  program-node-modules:
  program-target:

networks:
  repobounty:
    driver: bridge
