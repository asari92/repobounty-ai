server {
    listen 8080;
    resolver 127.0.0.11 ipv6=off;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.solana.com wss://*.solana.com https://api.devnet.solana.com https://api.mainnet-beta.solana.com; img-src 'self' data: https://avatars.githubusercontent.com; font-src 'self'" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
